# microagent configuration. NO secrets here — OPENROUTER_API_KEY is read from the environment.
# Anything in here can be overridden at runtime via slash-commands (/model, /effort, /cd).

# `model` is a SELECTOR: a bare PORT number (or an internal alias below) routes to an internal
# server; OpenRouter aliases (deepseek / opus / sonnet / glm) fall back to OpenRouter.
model: 8006                # internal DS-V4-Flash @ 10.123.51.179:8006  (default)
reasoning_effort: high     # OpenRouter unified reasoning effort: low | medium | high  ("max" == high)
max_turns: 60              # hard cap on agent turns per task
nudge: 2                   # max finish-the-job re-prompts before giving up (0 disables)
temperature: 0.3

# Internal vLLM (OpenAI-compatible) model servers. A bare PORT selects the model:
#   /model 8006 -> DS-V4-Flash ; /model 8003 -> GLM-5.2 ; /model 8002 -> GLM-5-FP8
# No reasoning:{effort} is sent (vLLM rejects it); no API key unless internal.api_key_env names one.
# `decode` is the transport per port (hub ports differ): sse (stream) | json (non-stream) | auto.
#   - 8002 (GLM-5-FP8): JSON works.   - 8007 (GLM5.1): needs SSE.   - 8006 (direct vLLM): both.
internal:
  host: 10.123.51.179      # default host; a per-port `host:` below overrides it (other machines)
  scheme: http
  api_key_env: ""          # e.g. INTERNAL_API_KEY if a server was started with --api-key
  reasoning: false
  decode: auto             # default for unlisted ports: stream, fall back to JSON if no SSE body
  # max_ctx = context window. 0 / omitted => detect at runtime: direct vLLM reports it in
  # /v1/models; gateways don't, so we fall back to a one-off non-generating overflow probe.
  # The gateway values below are pinned manually (from that probe) so no probe runs at runtime.
  ports:                   # model: "" => auto-detect via /v1/models; host: "" => use host above
    8002: { alias: glm5-fp8, model: GLM-5-FP8,       decode: json, max_ctx: 202752 }  # gateway: JSON
    8003: { alias: glm52,    model: GLM-5.2,         decode: auto, max_ctx: 81920 }   # gateway: SSE+JSON
    8006: { alias: ds-flash, model: DS-V4-Flash-8no, decode: auto }   # direct vLLM (->DGX): ctx auto (1M)
    8007: { alias: glm51,    model: GLM5.1,          decode: sse,  max_ctx: 202752 }  # gateway: needs SSE
  aliases:                 # named model variants pinned on a port (override the port's default model)
    glm52-think: { port: 8003, model: GLM-5.2-think }   # GLM-5.2 reasoning variant (inherits 8003 max_ctx)

# OpenRouter — the fallback / frontier provider. Select by alias: /model opus | sonnet | glm | deepseek
openrouter:
  api_base: https://openrouter.ai/api/v1
  # api_key is taken from $OPENROUTER_API_KEY (never stored in this file)

# Kernel tree / build — PROJECT-SPECIFIC. Leave unset to work in the current directory
# (active_dir defaults to $PWD). Uncomment + set for a fixed tree and cross-build.
# Example (Raspberry Pi 4 / arm64):
# linux_src: /path/to/linux-src          # fixed active tree (else: current working directory)
# build_script: /path/to/build.sh        # full-rebuild script
# config_fragment: /path/to/frag.cfg     # kconfig merge fragment
# run_scripts_dir: /path/to/run-scripts  # dir holding run-vm-*.sh
# cross_compile: aarch64-linux-gnu-      # toolchain prefix (omit for a native build)
# arch: arm64                            # target arch (omit for the host arch)
# deploy_image_name: Image-microagent    # name the built Image is given on the remote

# Remote host that runs QEMU (PROJECT-SPECIFIC; unset => no remote). Build is local; the
# Image is scp'd here and booted. Uncomment + set to enable deploy_qemu / ssh_exec.
# ssh:
#   host: your-qemu-host
#   user: ubuntu
#   port: 22
#   guest_ssh_port: 2222     # host-forwarded port into the QEMU guest (ssh -p 2222 user@localhost)
#   remote_qemu_dir: qemu    # dir on the remote holding run-vm-*.sh + kernel images

# Autonomy / safety. The agent runs everything without asking EXCEPT commands matching the
# destructive patterns below, which always require explicit confirmation (raw-disk flashing).
autonomy:
  gate_disk_flashing: true
  destructive_patterns:
    - '(^|\s)dd\s'
    - '(^|\s)mkfs(\.|\s)'
    - '(^|\s)parted(\s|$)'
    - '(^|\s)sgdisk(\s|$)'
    - '(^|\s)wipefs(\s|$)'
    - '/dev/sd[a-z]'
    - '/dev/mmcblk'
    - 'of=/dev/'

tui:
  show_thinking: true
  spinner_hz: 10

# Optional project build/deploy reference injected into the system prompt (PROJECT-SPECIFIC).
# knowledge_pack: knowledge/your_build_notes.md
